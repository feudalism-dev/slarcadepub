<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MOAP URL simulator</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #111;
        color: #ccc;
        font-family: sans-serif;
      }
      #bar {
        padding: 0.5rem 1rem;
        background: #222;
        border-bottom: 1px solid #444;
        font-size: 0.85rem;
      }
      iframe {
        border: 0;
        width: 100%;
        height: calc(100% - 40px);
        display: block;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="bar">Simulates SL MOAP direct load with sl_* query params (no data: bootstrap)</div>
    <iframe id="game" title="game"></iframe>
    <script>
      (function () {
        var params = new URLSearchParams({
          sl_game: "invaders",
          sl_token: "devtoken123",
          sl_scores: "0",
          sl_name: "Dev Resident",
          sl_avatar: "00000000-0000-0000-0000-000000000001",
        });
        document.getElementById("game").src =
          "../games/invaders/?" + params.toString();
      })();
    </script>
  </body>
</html>
