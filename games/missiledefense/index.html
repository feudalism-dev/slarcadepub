<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>SL Missile Defense</title>
    <style>
      html,
      body,
      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #050a12;
      }
      #game {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        display: block;
      }
    </style>
    <link rel="stylesheet" href="style.css?v=4" />
  </head>
  <body>
    <div id="app">
      <div id="game-wrap">
        <canvas id="game" width="600" height="600"></canvas>
        <div id="hud"></div>
        <div id="overlay">
          <div>
            <h1 id="overlay-title">SL MISSILE DEFENSE</h1>
            <p id="instructions">Command console: click to fire interceptors. Infinite waves. Bonus city every 10,000 pts held in reserve.</p>
            <p id="player-line">Player: …</p>
            <div id="start-scores" class="start-scores">
              <p id="personal-score">Your top score: —</p>
              <p id="high-score">High score: —</p>
            </div>
            <div id="scores-unavailable" class="hidden"></div>
            <div id="game-messages"></div>
            <p id="end-hint"></p>
            <div class="overlay-actions">
              <button id="btn-start" type="button">START</button>
              <button id="btn-leaderboard" type="button" class="hidden">LEADERBOARD</button>
              <button id="btn-next" type="button" class="hidden">NEXT WAVE</button>
            </div>
          </div>
        </div>
        <button id="btn-quit" type="button" class="hidden" title="Quit game (Esc)">QUIT</button>
      </div>
    </div>
    <div id="leaderboard-modal" class="modal hidden" role="dialog" aria-labelledby="leaderboard-title" aria-modal="true">
      <div class="modal-panel">
        <h2 id="leaderboard-title">LEADERBOARD</h2>
        <ol id="leaderboard"></ol>
        <button id="btn-modal-close" type="button">CLOSE</button>
      </div>
    </div>
    <script src="../../shared/sl-api.js?v=19"></script>
    <script src="game.js?v=14"></script>
  </body>
</html>
