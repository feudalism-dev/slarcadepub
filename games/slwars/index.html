<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>SL Wars</title>
    <style>
      html,
      body,
      #app {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
    </style>
    <link rel="stylesheet" href="style.css?v=10" />
  </head>
  <body>
    <div id="app">
      <div id="game-wrap">
        <canvas id="game" width="640" height="480"></canvas>
        <div id="overlay">
          <div>
            <h1 id="overlay-title">SL WARS</h1>
            <p id="instructions">Perspective engine test. START opens the Death Star surface — receding grid + turrets.</p>
            <div class="overlay-actions">
              <button id="btn-start" type="button">START SURFACE</button>
            </div>
          </div>
        </div>
        <div id="state-label"></div>
      </div>
    </div>
    <script src="../../shared/sl-api.js?v=18"></script>
    <script src="game.js?v=10"></script>
  </body>
</html>
