<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SL Arcade</title>
    <link rel="stylesheet" href="shared/hub.css" />
  </head>
  <body>
    <main id="hub">
      <header>
        <h1>SL Arcade</h1>
        <p id="hub-subtitle">Select a game</p>
      </header>
      <ul id="game-list" aria-label="Available games"></ul>
      <p id="hub-hint" class="hint">
        In-world cabinets can link directly to a single game. This page is used
        when the prim is configured with <code>GAME_ID = "hub"</code>.
      </p>
    </main>
    <script src="shared/hub.js"></script>
  </body>
</html>
